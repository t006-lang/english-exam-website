<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1200單字 - 會考英語練習</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-title">📚 會考英語練習</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">首頁</a>
      <a href="exam.html" class="nav-link">試題</a>
      <a href="vocab.html" class="nav-link active">單字</a>
    </nav>
  </div>
</header>

<main>
  <div class="vocab-tabs">
    <button class="vtab active" onclick="switchTab('flashcard')">單字卡</button>
    <button class="vtab" onclick="switchTab('quiz')">測驗</button>
    <button class="vtab" onclick="switchTab('smart')">智慧複習 <span id="reviewBadge" class="badge"></span></button>
    <button class="vtab" onclick="switchTab('stats')">學習統計</button>
  </div>

  <div class="vocab-filter">
    <button class="filter-btn active" onclick="setFilter('all')">全部</button>
    <button class="filter-btn" onclick="setFilter('new')">未學習</button>
    <button class="filter-btn" onclick="setFilter('learning')">學習中</button>
    <button class="filter-btn" onclick="setFilter('learned')">已熟悉</button>
    <input type="text" id="searchBox" placeholder="搜尋單字…" oninput="doSearch()" class="search-input">
  </div>

  <!-- 單字卡 -->
  <div id="tabFlashcard" class="tab-content">
    <div class="card-progress"><span id="fcProgress">0 / 0</span></div>
    <div class="flashcard-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-front" id="cardFront">
          <div class="card-word" id="fcWord"></div>
          <div class="card-pos" id="fcPos"></div>
          <div class="card-hint">點擊翻面</div>
        </div>
        <div class="card-back" id="cardBack" style="display:none">
          <div class="card-chinese" id="fcChinese"></div>
          <div class="card-word-small" id="fcWordSmall"></div>
        </div>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn-wrong" onclick="markStatus('new')">✗ 不熟</button>
      <button class="btn-nav" onclick="fcPrev()">← 上一個</button>
      <button class="btn-nav" onclick="fcNext()">下一個 →</button>
      <button class="btn-learned" onclick="markStatus('learned')">✓ 記住了</button>
    </div>
  </div>

  <!-- 測驗 -->
  <div id="tabQuiz" class="tab-content" style="display:none">
    <div class="quiz-wrap" id="quizWrap">
      <div class="quiz-score">本輪：<span id="quizScore">0</span>/<span id="quizTotal">0</span></div>
      <div class="quiz-qword" id="quizWord"></div>
      <div class="quiz-options" id="quizOptions"></div>
      <button class="btn-primary" id="btnNextQuiz" onclick="nextQuizQ()" style="display:none">下一題</button>
    </div>
    <div class="quiz-end" id="quizEnd" style="display:none">
      <h3>本輪結果</h3>
      <div class="quiz-end-score" id="quizEndScore"></div>
      <button class="btn-primary" onclick="startQuiz()">再來一輪</button>
    </div>
  </div>

  <!-- 智慧複習 -->
  <div id="tabSmart" class="tab-content" style="display:none">
    <div class="smart-header">
      <p>今日需複習：<strong id="reviewCount">0</strong> 個單字</p>
      <p class="smart-desc">根據記憶曲線，以下單字需要複習</p>
    </div>
    <div id="smartWrap">
      <div class="flashcard-wrap">
        <div class="flashcard" id="smartCard" onclick="flipSmartCard()">
          <div class="card-front" id="smartFront">
            <div class="card-word" id="smWord"></div>
            <div class="card-pos" id="smPos"></div>
            <div class="card-hint">點擊翻面</div>
          </div>
          <div class="card-back" id="smartBack" style="display:none">
            <div class="card-chinese" id="smChinese"></div>
            <div class="card-word-small" id="smWordSmall"></div>
          </div>
        </div>
      </div>
      <div class="smart-counter">第 <span id="smCurrent">1</span> / <span id="smTotal">1</span> 個</div>
      <div class="smart-actions" id="smartActions" style="display:none">
        <button class="btn-wrong" onclick="smartReview('forgot')">😟 忘了</button>
        <button class="btn-secondary" onclick="smartReview('vague')">🤔 模糊</button>
        <button class="btn-learned" onclick="smartReview('remember')">😊 記得</button>
      </div>
    </div>
    <div id="smartDone" style="display:none">
      <div class="smart-done-msg">🎉 今天的複習完成了！</div>
      <button class="btn-primary" onclick="loadSmartReview()">重新載入</button>
    </div>
  </div>

  <!-- 學習統計 -->
  <div id="tabStats" class="tab-content" style="display:none">
    <div class="stats-grid">
      <div class="stats-card">
        <div class="stats-num" id="stNew">0</div>
        <div class="stats-label">未學習</div>
      </div>
      <div class="stats-card">
        <div class="stats-num" id="stLearning">0</div>
        <div class="stats-label">學習中</div>
      </div>
      <div class="stats-card">
        <div class="stats-num" id="stLearned">0</div>
        <div class="stats-label">已熟悉</div>
      </div>
      <div class="stats-card">
        <div class="stats-num" id="stTotal">1209</div>
        <div class="stats-label">總單字數</div>
      </div>
    </div>
    <div class="pie-section">
      <canvas id="pieChart" width="200" height="200"></canvas>
    </div>
    <div class="history-section">
      <h3>最近7天</h3>
      <div id="weeklyBars" class="weekly-bars"></div>
    </div>
  </div>
</main>

<script src="js/storage.js"></script>
<script src="js/vocab.js"></script>
</body>
</html>
