<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1200單字 - 會考英語練習</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-title">📚 會考英語練習</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">首頁</a>
      <a href="exam.html" class="nav-link">試題</a>
      <a href="vocab.html" class="nav-link active">單字</a>
    </nav>
  </div>
</header>

<main class="page">
  <div class="vtab-bar">
    <button class="vtab active" onclick="switchTab('flashcard')">單字卡</button>
    <button class="vtab" onclick="switchTab('quiz')">測驗</button>
    <button class="vtab" onclick="switchTab('smart')">智慧複習 <span id="reviewBadge" class="badge"></span></button>
    <button class="vtab" onclick="switchTab('stats')">學習統計</button>
    <a href="https://andyjunyi.github.io/voc-935/" target="_blank" class="vtab vtab-link">🌐 935字彙（鄭博仁老師）</a>
  </div>

  <!-- 主題分類列 -->
  <div class="topic-wrap" id="topicFilter">
    <button class="topic-chip active" onclick="setTopic('')">📚 全部主題</button>
    <button class="topic-chip" onclick="setTopic('People')">👥 人物</button>
    <button class="topic-chip" onclick="setTopic('Personal characteristics')">💡 個人特質</button>
    <button class="topic-chip" onclick="setTopic('Body')">🦴 身體</button>
    <button class="topic-chip" onclick="setTopic('Clothing')">👕 衣物</button>
    <button class="topic-chip" onclick="setTopic('Food & Drinks')">🍎 食物飲料</button>
    <button class="topic-chip" onclick="setTopic('Housing')">🏠 住所</button>
    <button class="topic-chip" onclick="setTopic('Family')">👨‍👩‍👧 家庭</button>
    <button class="topic-chip" onclick="setTopic('Health')">🏥 健康</button>
    <button class="topic-chip" onclick="setTopic('School')">🏫 學校</button>
    <button class="topic-chip" onclick="setTopic('Work & Occupations')">💼 工作職業</button>
    <button class="topic-chip" onclick="setTopic('Transportation & Travel')">🚌 交通旅遊</button>
    <button class="topic-chip" onclick="setTopic('Sports & Recreation')">⚽ 運動休閒</button>
    <button class="topic-chip" onclick="setTopic('Nature & Weather')">🌿 自然天氣</button>
    <button class="topic-chip" onclick="setTopic('Animals')">🐾 動物</button>
    <button class="topic-chip" onclick="setTopic('Time & Calendar')">📅 時間日曆</button>
    <button class="topic-chip" onclick="setTopic('Numbers & Quantities')">🔢 數字量詞</button>
    <button class="topic-chip" onclick="setTopic('Places & Directions')">📍 地點方向</button>
    <button class="topic-chip" onclick="setTopic('Communication & Technology')">💻 通訊科技</button>
    <button class="topic-chip" onclick="setTopic('Shopping & Money')">🛒 購物金錢</button>
    <button class="topic-chip" onclick="setTopic('Daily Activities')">🌟 日常活動</button>
    <button class="topic-chip" onclick="setTopic('Grammar & Function Words')">📝 文法功能詞</button>
  </div>

  <div class="status-filter">
    <button class="status-btn active" onclick="setFilter('all')">全部</button>
    <button class="status-btn" onclick="setFilter('new')">未學習</button>
    <button class="status-btn" onclick="setFilter('learning')">學習中</button>
    <button class="status-btn" onclick="setFilter('learned')">已熟悉</button>
    <input type="text" id="searchBox" placeholder="搜尋單字…" oninput="doSearch()" class="search-input">
  </div>

  <!-- 單字卡 -->
  <div id="tabFlashcard" class="tab-content">
    <div class="fc-meta"><span id="fcProgress">0 / 0</span></div>
    <div class="fc-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-front" id="cardFront">
          <div class="fc-word" id="fcWord"></div>
          <div class="fc-pos" id="fcPos"></div>
          <div class="fc-hint">點擊翻面</div>
        </div>
        <div class="card-back" id="cardBack" style="display:none">
          <div class="fc-chinese" id="fcChinese"></div>
          <div class="fc-word-sm" id="fcWordSmall"></div>
        </div>
      </div>
    </div>
    <div class="fc-actions">
      <button class="btn btn-danger btn-sm" onclick="markStatus('new')">✗ 不熟</button>
      <button class="btn btn-ghost" onclick="fcPrev()">← 上一個</button>
      <button class="btn btn-ghost" onclick="fcNext()">下一個 →</button>
      <button class="btn btn-success btn-sm" onclick="markStatus('learned')">✓ 記住了</button>
    </div>
  </div>

  <!-- 測驗 -->
  <div id="tabQuiz" class="tab-content" style="display:none">
    <div id="quizWrap">
      <div class="quiz-score-bar">本輪：<strong><span id="quizScore">0</span>/<span id="quizTotal">0</span></strong></div>
      <div class="quiz-word-card">
        <div class="quiz-word" id="quizWord"></div>
      </div>
      <div class="quiz-opts" id="quizOptions"></div>
      <div style="text-align:center">
        <button class="btn btn-primary" id="btnNextQuiz" onclick="nextQuizQ()" style="display:none">下一題</button>
      </div>
    </div>
    <div class="quiz-result" id="quizEnd" style="display:none">
      <div style="font-size:15px;color:var(--text-2);margin-bottom:8px">本輪結果</div>
      <div class="quiz-result-score" id="quizEndScore"></div>
      <button class="btn btn-primary" onclick="startQuiz()">再來一輪</button>
    </div>
  </div>

  <!-- 智慧複習 -->
  <div id="tabSmart" class="tab-content" style="display:none">
    <div class="smart-info">
      <div class="smart-num" id="reviewCount">0</div>
      <div class="smart-label">今日需複習單字</div>
      <div style="font-size:13px;color:var(--text-3);margin-top:4px">根據記憶曲線，以下單字需要複習</div>
    </div>
    <div id="smartWrap">
      <div class="fc-wrap">
        <div class="flashcard" id="smartCard" onclick="flipSmartCard()">
          <div class="card-front" id="smartFront">
            <div class="fc-word" id="smWord"></div>
            <div class="fc-pos" id="smPos"></div>
            <div class="fc-hint">點擊翻面</div>
          </div>
          <div class="card-back" id="smartBack" style="display:none">
            <div class="fc-chinese" id="smChinese"></div>
            <div class="fc-word-sm" id="smWordSmall"></div>
          </div>
        </div>
      </div>
      <div class="smart-counter">第 <span id="smCurrent">1</span> / <span id="smTotal">1</span> 個</div>
      <div class="smart-actions" id="smartActions" style="display:none">
        <button class="btn btn-danger btn-sm" onclick="smartReview('forgot')">😟 忘了</button>
        <button class="btn btn-ghost" onclick="smartReview('vague')">🤔 模糊</button>
        <button class="btn btn-success btn-sm" onclick="smartReview('remember')">😊 記得</button>
      </div>
    </div>
    <div class="smart-done" id="smartDone" style="display:none">
      <span class="smart-done-emoji">🎉</span>
      <div class="smart-done-msg">今天的複習完成了！</div>
      <button class="btn btn-primary" onclick="loadSmartReview()">重新載入</button>
    </div>
  </div>

  <!-- 學習統計 -->
  <div id="tabStats" class="tab-content" style="display:none">
    <div class="stats-4grid">
      <div class="stats-card">
        <div class="stats-num" id="stNew">0</div>
        <div class="stats-label">未學習</div>
      </div>
      <div class="stats-card">
        <div class="stats-num" id="stLearning">0</div>
        <div class="stats-label">學習中</div>
      </div>
      <div class="stats-card">
        <div class="stats-num" id="stLearned">0</div>
        <div class="stats-label">已熟悉</div>
      </div>
      <div class="stats-card">
        <div class="stats-num" id="stTotal">1209</div>
        <div class="stats-label">總單字數</div>
      </div>
    </div>
    <div class="pie-wrap">
      <canvas id="pieChart" width="200" height="200"></canvas>
      <div class="pie-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#94a3b8"></span>未學習</div>
        <div class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>學習中</div>
        <div class="legend-item"><span class="legend-dot" style="background:#34d399"></span>已熟悉</div>
      </div>
    </div>
    <div class="week-section">
      <h3>最近 7 天學習</h3>
      <div id="weeklyBars" class="week-bars"></div>
    </div>
  </div>

</main>

<script src="js/storage.js"></script>
<script src="js/vocab.js"></script>
</body>
</html>
