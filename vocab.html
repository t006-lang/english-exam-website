<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1200 單字 - 會考英語練習</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-title">📚 會考英語練習</a>
      <nav class="nav-links">
        <a href="index.html" class="nav-link">首頁</a>
        <a href="exam.html" class="nav-link">試題</a>
        <a href="vocab.html" class="nav-link active">單字</a>
      </nav>
    </div>
  </header>

  <!-- Tab navigation -->
  <div class="vocab-header">
    <div class="vocab-header-inner">
      <div class="tab-nav">
        <button class="tab-btn active" id="tabFlashcard" onclick="switchTab('flashcard')">單字卡</button>
        <button class="tab-btn" id="tabQuiz" onclick="switchTab('quiz')">單字測驗</button>
      </div>
    </div>
  </div>

  <main class="vocab-main">
    <!-- Loading -->
    <div class="loading" id="loadingState">
      <div class="loading-spinner"></div>
      <p>載入單字中...</p>
    </div>

    <!-- Filter bar (shared) -->
    <div class="filter-bar" id="filterBar" style="display:none;">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="unlearned" onclick="setFilter('unlearned')">未學會</button>
      <button class="filter-btn" data-filter="learned" onclick="setFilter('learned')">已學會</button>
      <span class="filter-count" id="filterCount"></span>
    </div>

    <!-- ===== FLASHCARD TAB ===== -->
    <div id="tabContentFlashcard" style="display:none;">

      <div class="flashcard-nav">
        <button class="nav-btn" id="fcPrevBtn" onclick="fcPrev()">← 上一個</button>
        <span class="fc-counter" id="fcCounter">1 / 448</span>
        <button class="nav-btn primary" id="fcNextBtn" onclick="fcNext()">下一個 →</button>
      </div>

      <div class="flashcard-container">
        <div class="flashcard" id="flashcard" onclick="flipCard()">
          <div class="card-face card-front" id="cardFront">
            <div class="card-word" id="cardWord">apple</div>
            <div class="card-pos" id="cardPos">n.</div>
            <div class="card-hint">點擊查看中文</div>
          </div>
          <div class="card-face card-back" id="cardBack">
            <div class="card-chinese" id="cardChinese">蘋果</div>
            <div class="card-pos-back" id="cardPosBack">n.</div>
            <div class="card-word-small" id="cardWordSmall">apple</div>
          </div>
        </div>
      </div>

      <button class="learned-btn" id="learnedBtn" onclick="toggleLearned()">
        標記為「已學會」
      </button>

      <!-- Keyboard hint -->
      <p style="text-align:center; font-size:0.8rem; color:#aaa; margin-top:12px;">
        按空白鍵翻卡 · ← → 切換
      </p>
    </div>

    <!-- ===== QUIZ TAB ===== -->
    <div id="tabContentQuiz" style="display:none;">

      <div class="quiz-stats">
        <div class="quiz-stat">
          <div class="quiz-stat-num" id="quizCorrect">0</div>
          <div class="quiz-stat-label">答對</div>
        </div>
        <div class="quiz-stat">
          <div class="quiz-stat-num" id="quizWrong">0</div>
          <div class="quiz-stat-label">答錯</div>
        </div>
        <div class="quiz-stat">
          <div class="quiz-stat-num" id="quizPct">—</div>
          <div class="quiz-stat-label">正確率</div>
        </div>
      </div>

      <div class="quiz-word-display">
        <div class="quiz-word" id="quizWord">apple</div>
        <div class="quiz-pos" id="quizPos">n.</div>
      </div>

      <div class="quiz-options" id="quizOptions">
        <!-- Generated dynamically -->
      </div>

      <div id="quizFeedback" style="display:none; text-align:center; padding:10px; border-radius:8px; font-weight:700; margin-bottom:12px;"></div>

      <button class="nav-btn primary" id="quizNextBtn" onclick="nextQuizQuestion()" style="width:100%; display:none;">
        下一題 →
      </button>

      <div style="text-align:center; margin-top:12px;">
        <button class="btn btn-outline" onclick="resetQuizStats()">重置分數</button>
      </div>
    </div>

  </main>

  <script src="js/vocab.js"></script>
  <script>
    initVocab();
  </script>
</body>
</html>
