<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會考英語練習</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-title">📚 會考英語練習</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link active">首頁</a>
      <a href="exam.html" class="nav-link">試題</a>
      <a href="vocab.html" class="nav-link">單字</a>
    </nav>
  </div>
</header>

<main class="home-main">
  <section class="hero">
    <h1>會考英語練習</h1>
    <p class="subtitle">國中教育會考英語閱讀 · 107-114年歷屆試題 · 1200核心單字</p>
  </section>

  <section class="stats-bar" id="statsBar">
    <div class="stat-item"><span class="stat-num" id="statExams">0</span><span class="stat-label">次練習</span></div>
    <div class="stat-item"><span class="stat-num" id="statAvg">-</span><span class="stat-label">平均正確率</span></div>
    <div class="stat-item"><span class="stat-num" id="statWrong">0</span><span class="stat-label">錯題待複習</span></div>
    <div class="stat-item"><span class="stat-num" id="statWords">0</span><span class="stat-label">單字已學會</span></div>
  </section>

  <section class="main-cards">
    <a href="exam.html" class="main-card card-exam">
      <div class="card-icon">📝</div>
      <h2>歷屆試題</h2>
      <p>107-114年 · 逐題作答 · 即時解析 · 錯題收集</p>
      <div class="card-modes">
        <span class="mode-tag">年份練習</span>
        <span class="mode-tag">模擬考</span>
        <span class="mode-tag">錯題練習</span>
        <span class="mode-tag">自訂練習</span>
      </div>
    </a>
    <a href="vocab.html" class="main-card card-vocab">
      <div class="card-icon">🔤</div>
      <h2>1200單字</h2>
      <p>翻牌記憶 · 四選一測驗 · 智慧間隔複習</p>
      <div class="card-modes">
        <span class="mode-tag">單字卡</span>
        <span class="mode-tag">測驗</span>
        <span class="mode-tag">智慧複習</span>
        <span class="mode-tag">學習統計</span>
      </div>
    </a>
  </section>

  <section class="recent-section" id="recentSection" style="display:none">
    <h3>最近練習</h3>
    <div id="recentList"></div>
  </section>
</main>

<script src="js/storage.js"></script>
<script>
  const stats = Storage.getStats();
  document.getElementById('statExams').textContent = stats.totalAttempted;
  document.getElementById('statAvg').textContent = stats.totalAttempted ? stats.avgScore + '%' : '-';
  document.getElementById('statWrong').textContent = stats.wrongCount;
  document.getElementById('statWords').textContent = stats.learnedWords;

  const history = Storage.getExamHistory().slice(0, 5);
  if (history.length > 0) {
    document.getElementById('recentSection').style.display = '';
    const list = document.getElementById('recentList');
    list.innerHTML = history.map(h => `
      <div class="recent-item">
        <span class="recent-year">${h.year}年</span>
        <span class="recent-mode">${h.mode === 'mock' ? '模擬考' : h.mode === 'wrong' ? '錯題練習' : '年份練習'}</span>
        <span class="recent-score ${h.score/h.total >= 0.8 ? 'grade-a' : h.score/h.total >= 0.6 ? 'grade-b' : 'grade-c'}">${h.score}/${h.total} (${Math.round(h.score/h.total*100)}%)</span>
        <span class="recent-date">${h.date}</span>
      </div>`).join('');
  }
</script>
</body>
</html>
