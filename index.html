<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國中英語會考衝刺站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-title">📚 國中英語會考衝刺站</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link active">首頁</a>
      <a href="exam.html" class="nav-link">歷屆試題</a>
      <a href="vocab.html" class="nav-link">1200單字</a>
    </nav>
  </div>
</header>

<main class="page">
  <section class="hero-section">
    <span class="hero-label">國中教育會考</span>
    <h1 class="hero-title">國中英語<span>會考衝刺站</span></h1>
    <p class="hero-subtitle">110–114 年歷屆試題 · 1200 核心單字 · 智慧間隔複習</p>
  </section>

  <div class="stats-row" id="statsBar">
    <div class="stat-card"><span class="stat-num" id="statExams">0</span><span class="stat-label">次練習</span></div>
    <div class="stat-card"><span class="stat-num" id="statAvg">-</span><span class="stat-label">平均正確率</span></div>
    <div class="stat-card"><span class="stat-num" id="statWrong">0</span><span class="stat-label">錯題待複習</span></div>
    <div class="stat-card"><span class="stat-num" id="statWords">0</span><span class="stat-label">單字已學會</span></div>
  </div>

  <div class="feature-grid">
    <a href="exam.html" class="feature-card feature-card-exam">
      <span class="feature-icon">📝</span>
      <div class="feature-title">歷屆試題</div>
      <div class="feature-desc">110–114 年逐題作答，即時解析，自動收集錯題，支援模擬考計時模式。</div>
      <div class="feature-tags">
        <span class="chip chip-primary">年份練習</span>
        <span class="chip chip-primary">模擬考</span>
        <span class="chip chip-primary">錯題練習</span>
        <span class="chip chip-primary">自訂練習</span>
      </div>
    </a>
    <a href="vocab.html" class="feature-card feature-card-vocab">
      <span class="feature-icon">🔤</span>
      <div class="feature-title">1200 單字</div>
      <div class="feature-desc">依教育部主題分類，翻牌記憶、四選一測驗，SM-2 智慧間隔複習。</div>
      <div class="feature-tags">
        <span class="chip chip-warning">單字卡</span>
        <span class="chip chip-warning">測驗</span>
        <span class="chip chip-warning">智慧複習</span>
        <span class="chip chip-warning">學習統計</span>
      </div>
    </a>
  </div>

  <section id="recentSection" style="display:none">
    <div class="section-header">
      <span class="section-title">📋 最近練習</span>
    </div>
    <div class="recent-list" id="recentList"></div>
  </section>
</main>

<script src="js/storage.js"></script>
<script>
  const stats = Storage.getStats();
  document.getElementById('statExams').textContent = stats.totalAttempted;
  document.getElementById('statAvg').textContent = stats.totalAttempted ? stats.avgScore + '%' : '-';
  document.getElementById('statWrong').textContent = stats.wrongCount;
  document.getElementById('statWords').textContent = stats.learnedWords;

  const history = Storage.getExamHistory().slice(0, 5);
  if (history.length > 0) {
    document.getElementById('recentSection').style.display = '';
    const list = document.getElementById('recentList');
    list.innerHTML = history.map(h => {
      const pct = Math.round(h.score / h.total * 100);
      const gradeClass = pct >= 80 ? 'grade-a' : pct >= 60 ? 'grade-b' : 'grade-c';
      const modeLabel = h.mode === 'mock' ? '模擬考' : h.mode === 'wrong' ? '錯題練習' : h.mode === 'custom' ? '自訂練習' : '年份練習';
      return `<div class="recent-card">
        <span class="recent-year">${h.year}年</span>
        <span class="recent-mode">${modeLabel}</span>
        <span class="recent-score ${gradeClass}">${h.score}/${h.total} (${pct}%)</span>
        <span class="recent-date">${h.date}</span>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
