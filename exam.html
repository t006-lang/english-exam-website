<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>歷屆試題 - 國中英語會考衝刺站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-title">📚 國中英語會考衝刺站</a>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">首頁</a>
      <a href="exam.html" class="nav-link active">試題</a>
      <a href="vocab.html" class="nav-link">單字</a>
    </nav>
  </div>
</header>

<main id="app" class="page">
  <!-- 選擇模式畫面 -->
  <div id="screenSelect">
    <h2 class="page-heading">選擇練習模式</h2>
    <p class="page-subhead">共 110–114 年 5 份歷屆試題，多種模式任你選</p>

    <div class="mode-grid">
      <div class="mode-card" onclick="showYearSelect('year')">
        <span class="mode-icon">📅</span>
        <div class="mode-title">年份練習</div>
        <div class="mode-desc">選擇特定年份，逐題作答</div>
      </div>
      <div class="mode-card" onclick="showYearSelect('mock')">
        <span class="mode-icon">⏱️</span>
        <div class="mode-title">模擬考</div>
        <div class="mode-desc">限時 60 分鐘，完整模擬考場</div>
      </div>
      <div class="mode-card" id="wrongModeCard" onclick="startWrongPractice()">
        <span class="mode-icon">❌</span>
        <div class="mode-title">錯題練習</div>
        <div class="mode-desc">專攻曾經答錯的題目</div>
        <span class="badge mode-badge" id="wrongCountBadge"></span>
      </div>
      <div class="mode-card" onclick="showCustomMode()">
        <span class="mode-icon">🎯</span>
        <div class="mode-title">自訂練習</div>
        <div class="mode-desc">根據年份、分項能力、題數自由搭配</div>
      </div>
    </div>

    <!-- 年份選擇 -->
    <div id="yearSelectPanel" style="display:none">
      <div class="sub-heading" id="yearSelectTitle">選擇年份</div>
      <div class="year-grid">
        <button class="year-card" onclick="startExam(110)">110年</button>
        <button class="year-card" onclick="startExam(111)">111年</button>
        <button class="year-card" onclick="startExam(112)">112年</button>
        <button class="year-card" onclick="startExam(113)">113年</button>
        <button class="year-card" onclick="startExam(114)">114年</button>
      </div>
    </div>

    <!-- 自訂模式 -->
    <div id="customPanel" style="display:none">
      <div class="sub-heading">自訂練習設定</div>
      <div class="custom-panel">
        <span class="form-label">選擇年份（可多選）</span>
        <div class="year-check-grid">
          <label><input type="checkbox" name="cy" value="110"> 110年</label>
          <label><input type="checkbox" name="cy" value="111"> 111年</label>
          <label><input type="checkbox" name="cy" value="112"> 112年</label>
          <label><input type="checkbox" name="cy" value="113"> 113年</label>
          <label><input type="checkbox" name="cy" value="114"> 114年</label>
        </div>
        <span class="form-label">題型</span>
        <div class="type-check-grid">
          <label><input type="radio" name="qtype" value="all" checked> 全部</label>
          <label><input type="radio" name="qtype" value="single"> 單題</label>
          <label><input type="radio" name="qtype" value="passage"> 閱讀測驗</label>
        </div>
        <span class="form-label">分項能力（不勾選＝全部）</span>
        <div class="skill-check-grid">
          <label><input type="checkbox" name="cskill" value="字詞理解"> 字詞理解</label>
          <label><input type="checkbox" name="cskill" value="語法結構"> 語法結構</label>
          <label><input type="checkbox" name="cskill" value="篇章細節"> 篇章細節</label>
          <label><input type="checkbox" name="cskill" value="篇章結構"> 篇章結構</label>
          <label><input type="checkbox" name="cskill" value="文意推論"> 文意推論</label>
          <label><input type="checkbox" name="cskill" value="篇章大意"> 篇章大意</label>
        </div>
        <div class="form-row">
          <span class="form-label" style="margin:0">題數</span>
          <input type="number" id="customCount" class="form-input" min="5" max="100" value="20">
          <span style="font-size:13px;color:var(--text-2)">題</span>
          <button class="btn btn-primary" onclick="startCustomExam()">開始練習</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 作答畫面 -->
  <div id="screenExam" style="display:none">
    <div class="exam-topbar">
      <span class="exam-label" id="examLabel"></span>
      <span class="exam-counter" id="examCounter"></span>
      <div class="exam-timer" id="examTimer" style="display:none">⏱️ <span id="timerDisplay">60:00</span></div>
      <button class="btn btn-ghost btn-sm" onclick="exitExam()">離開</button>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressBar"></div></div>

    <div class="q-nav-bar" id="qNavBar"></div>

    <div class="exam-body" id="examBody">
      <div class="exam-passage-col" id="passageCol" style="display:none">
        <div id="passageBox" class="passage-card"></div>
      </div>
      <div class="exam-question-col">
        <div class="question-card">
          <div class="q-label" id="qNum"></div>
          <div class="q-text" id="qText"></div>
          <div id="questionImageBox" style="display:none; margin: 12px 0;"></div>
          <div class="options-list" id="optionsGrid"></div>
          <div class="feedback-card" id="feedbackBox" style="display:none"></div>
        </div>
        <div class="exam-nav">
          <button class="btn btn-ghost" id="btnPrev" onclick="prevQ()">← 上一題</button>
          <button class="btn btn-primary" id="btnNext" onclick="nextQ()" style="display:none">下一題 →</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 結果畫面 -->
  <div id="screenResult" style="display:none">
    <div class="result-hero">
      <div style="font-size:13px;color:var(--text-2);margin-bottom:8px">練習結果</div>
      <div class="result-score-big" id="resultScore"></div>
      <div class="result-grade-tag" id="resultGrade"></div>
    </div>

    <div class="analysis-card">
      <div class="sub-heading">弱點分析</div>
      <div id="analysisGrid"></div>
    </div>

    <div class="wrong-card" id="resultWrongSection">
      <div class="sub-heading">答錯的題目 <span id="wrongCount2" style="font-size:13px;color:var(--text-3);font-weight:400"></span></div>
      <div id="wrongList"></div>
    </div>

    <div class="result-actions">
      <button class="btn btn-danger" id="btnRetryWrong" onclick="retryWrong()">重做錯題</button>
      <button class="btn btn-outline" onclick="showSelect()">換年份</button>
      <button class="btn btn-ghost" onclick="window.location.href='index.html'">回首頁</button>
    </div>
  </div>
</main>

<script src="js/storage.js"></script>
<script src="js/exam.js"></script>
</body>
</html>
